name: Bug Report
description: Report a bug in doxr
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: |
        What happened? Include a minimal reproducible example if possible
        (the docstring, the file structure, and the doxr output).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: doxr version
      description: Output of `doxr --version`
    validations:
      required: false
